<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Thangamey ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#d8c9ff;
text-align:center;
overflow:hidden;
}

.container{
margin-top:20vh;
}

h1{
font-size:30px;
color:#4b2e83;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:12px;
margin:10px;
cursor:pointer;
}

#yesBtn{
background:#ff4da6;
color:white;
}

#noBtn{
background:#cccccc;
}

#videoPage{
display:none;
margin-top:10vh;
}

video{
max-height:75vh;
max-width:90%;
border-radius:20px;
}

#cinemaMessage{
display:none;
font-size:26px;
color:#4b2e83;
margin-top:40vh;
animation:fade 3s;
}

@keyframes fade{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

.heart{
position:absolute;
font-size:24px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container" id="question">

<h1>Will you be my Valentine? ❤️</h1>

<button id="yesBtn" onclick="yesClicked()">Yes</button>
<button id="noBtn" onclick="noClicked()">No</button>

</div>

<div id="cinemaMessage">
For you… my Thangamey ❤️
</div>

<div id="videoPage">

<video id="loveVideo" controls playsinline preload="metadata">
<source src="./ourlove.mp4" type="video/mp4">
</video>

<div id="finalMessage" style="display:none; margin-top:30px; font-size:26px; color:#4b2e83;">
Will you be my wife in every lifetime? ❤️
</div>

</div>

<audio id="bgMusic">
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

let noBtn=document.getElementById("noBtn")

noBtn.addEventListener("mouseover",function(){

let x=Math.random()*window.innerWidth*0.8
let y=Math.random()*window.innerHeight*0.8

noBtn.style.position="absolute"
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

})

function noClicked(){

alert("Nice try! 😜 But the answer must be YES ❤️")

}

function yesClicked(){

heartExplosion()

document.getElementById("question").style.display="none"

startFloatingHearts()

setTimeout(function(){

showCinema()

},500)

}

function showCinema(){

document.getElementById("cinemaMessage").style.display="block"

setTimeout(function(){

document.getElementById("cinemaMessage").style.display="none"

showVideo()

},3000)

}

function showVideo(){

document.getElementById("videoPage").style.display="block"

let video=document.getElementById("loveVideo");
video.addEventListener("ended",function(){
document.getElementById("finalMessage").style.display="block";
});

let music=document.getElementById("bgMusic")
music.play().catch(()=>{})

}

function heartExplosion(){

for(let i=0;i<40;i++){

let heart=document.createElement("div")
heart.innerHTML="❤️"
heart.style.position="absolute"
heart.style.left=Math.random()*100+"vw"
heart.style.top=Math.random()*100+"vh"
heart.style.fontSize="30px"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},2000)

}

}

function startFloatingHearts(){

let interval=setInterval(function(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💜"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},5000)

},300)

setTimeout(()=>{

clearInterval(interval)

},10000)

}

</script>

</body>
</html>
